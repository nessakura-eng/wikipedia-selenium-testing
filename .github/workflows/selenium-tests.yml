name: Wikipedia Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Selenium Tests
        env:
          CI: true
        run: |
          cd wikipedia-selenium
          mvn test -Dheadless=true

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: TestNG Results
          path: wikipedia-selenium/target/surefire-reports/*.xml
          reporter: java-junit
